<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riverr Town Studio - Contacts</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contacts {
            flex: 1;
            width: min(500px, calc(100% - 32px));
            max-width: 800px;
            margin: 48px auto;
            padding: 28px;
            text-align: center;
            background: #121212;
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.35);
            box-shadow: 0 8px 26px rgba(0, 0, 0, 0.48);
        }

        .contacts h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ffe070;
        }

        .contacts p {
            font-size: 18px;
            color: #d8c98b;
            margin-bottom: 12px;
        }

        .youtube-wrap {
            margin-top: 18px;
        }

        .youtube-wrap h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #ffe070;
        }

        .youtube-logo {
            width: 92px;
            height: 64px;
            background: #ff0000;
            border-radius: 16px;
            margin: 0 auto 12px;
            display: grid;
            place-items: center;
            box-shadow: 0 8px 18px rgba(255, 0, 0, 0.28);
        }

        .youtube-play {
            width: 0;
            height: 0;
            border-top: 11px solid transparent;
            border-bottom: 11px solid transparent;
            border-left: 18px solid #fff;
            margin-left: 3px;
        }

        .youtube-link {
            display: inline-block;
            margin-top: 10px;
            color: #ffd84d;
            font-weight: 600;
            text-decoration: none;
        }

        .youtube-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="logo.png" alt="Riverr Town Studio logo">
                <span>Riverr Town Studio</span>
            </div>
            <ul>
                <li><a href="index.html" data-i18n="nav_home">Начало</a></li>
                <li><a href="index.html#services" data-i18n="nav_services">Услуги</a></li>
                <li><a href="portfolio.html" data-i18n="nav_portfolio">Портфолио</a></li>
                <li><a href="contacts.html" data-i18n="nav_contact">Контакти</a></li>
                <li class="language-switch" aria-label="Избор на език / Language selection">
                    <button class="lang-btn active" data-lang="bg" type="button">🇧🇬 BG</button>
                    <button class="lang-btn" data-lang="en" type="button">🇬🇧 EN</button>
                </li>
            </ul>
        </nav>
    </header>

    <section class="contacts" id="contacts">
        <h1 data-i18n="contacts_title">Контакти:</h1>
        <p><strong data-i18n="contacts_email_label">Имейл:</strong> riverrtownstudio@yahoo.com</p>
        <p><strong data-i18n="contacts_phone_label">Телефон:</strong> +359 123 456 789</p>
        <div class="youtube-wrap">
            <h2 data-i18n="contacts_youtube">YouTube:</h2>
            <div class="youtube-logo" aria-hidden="true">
                <span class="youtube-play"></span>
            </div>
            <a class="youtube-link" href="https://www.youtube.com/@riverrtownstudio" target="_blank" rel="noopener noreferrer" data-i18n="contacts_youtube_open">Отвори YouTube канала</a>
        </div>
    </section>

    <footer>
        <p data-i18n="footer_text">&copy; 2024 Riverr Town Studio. Всички права запазени.</p>
    </footer>

    <script>
        const translations = {
            bg: {
                nav_home: "Начало",
                nav_services: "Услуги",
                nav_portfolio: "Портфолио",
                nav_contact: "Контакти",
                contacts_title: "Контакти:",
                contacts_email_label: "Имейл:",
                contacts_phone_label: "Телефон:",
                contacts_youtube: "YouTube:",
                contacts_youtube_open: "Отвори YouTube канала",
                footer_text: "&copy; 2024 Riverr Town Studio. Всички права запазени.",
                page_title: "Riverr Town Studio - Контакти"
            },
            en: {
                nav_home: "Home",
                nav_services: "Services",
                nav_portfolio: "Portfolio",
                nav_contact: "Contacts",
                contacts_title: "Contacts:",
                contacts_email_label: "Email:",
                contacts_phone_label: "Phone:",
                contacts_youtube: "YouTube:",
                contacts_youtube_open: "Open YouTube channel",
                footer_text: "&copy; 2024 Riverr Town Studio. All rights reserved.",
                page_title: "Riverr Town Studio - Contacts"
            }
        };

        const languageButtons = document.querySelectorAll('.lang-btn');
        const translatableElements = document.querySelectorAll('[data-i18n]');

        function setLanguage(lang) {
            const selectedLanguage = translations[lang] ? lang : 'bg';

            translatableElements.forEach((element) => {
                const key = element.getAttribute('data-i18n');
                if (translations[selectedLanguage][key]) {
                    element.innerHTML = translations[selectedLanguage][key];
                }
            });

            document.documentElement.lang = selectedLanguage;
            document.title = translations[selectedLanguage].page_title;
            localStorage.setItem('riverrtown-language', selectedLanguage);

            languageButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.lang === selectedLanguage);
            });
        }

        languageButtons.forEach((button) => {
            button.addEventListener('click', () => {
                setLanguage(button.dataset.lang);
            });
        });

        setLanguage(localStorage.getItem('riverrtown-language') || 'bg');
    </script>

</body>
</html>
